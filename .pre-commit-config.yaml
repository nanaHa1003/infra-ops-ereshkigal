---
# pre-commit hook configuration
# https://pre-commit.com
#
# Install hooks (one-time, per clone):
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Skip gitleaks for a single commit (e.g. after deliberately revoking a
# leaked credential and before the rotation is complete):
#   SKIP=gitleaks git commit -m "message"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config", ".gitleaks.toml"]
