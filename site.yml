---
- name: Proclaim the Ereshkigal Homelab
  hosts: homelab
  become: true

  roles:
    # OS baseline: Docker, SELinux, storage directories, DDNS
    - common

    # Infrastructure layer: reverse proxy, TLS, Docker socket proxies
    - proxy

    # Identity provider: SSO / OIDC / LDAP
    - auth

    # Media services
    - wordpress
    - pinchflat

    # Productivity & utility applications
    - immich
    - mealie
    - homepage
    - n8n
    - aria2
