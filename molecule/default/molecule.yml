---
# Molecule test configuration — uses Docker driver with Podman backend.
#
# Prerequisites (macOS + Podman):
#   export DOCKER_HOST=$$(podman machine inspect --format '{{.ConnectionInfo.PodmanSocket.Path}}')
#
# Run all tests:  molecule test
# Step by step:   molecule create && molecule converge && molecule verify && molecule destroy

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: homelab-test
    image: "geerlingguy/docker-fedora40-ansible:latest"
    pre_build_image: true
    privileged: true
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  env:
    # Point Molecule at the project roles/ directory at the repo root.
    # molecule/default/ is two levels below the repo root, so ../../roles resolves correctly.
    ANSIBLE_ROLES_PATH: $MOLECULE_SCENARIO_DIRECTORY/../../roles
    # DOCKER_HOST is intentionally NOT set here.
    # - In CI (GitHub Actions): Docker is available at the default socket, no override needed.
    # - Locally with Podman: export DOCKER_HOST before running molecule:
    #     export DOCKER_HOST=$$(podman machine inspect --format '{{.ConnectionInfo.PodmanSocket.Path}}')
  inventory:
    group_vars:
      all:
        # Minimal variable set for testing — no real secrets needed
        domain: "test.example.com"
        timezone: "UTC"
        stack_root: "/opt/stack"
        storage_root: "/mnt/storage"
        storage_permissions:
          - path: "caddy/data"
            owner: 0
            group: 0
            mode: "0755"
          - path: "caddy/config"
            owner: 0
            group: 0
            mode: "0755"
          - path: "authentik/media"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "authentik/postgresql"
            owner: 70
            group: 70
            mode: "0700"
          - path: "authentik/redis"
            owner: 999
            group: 1000
            mode: "0755"
          - path: "wordpress/db"
            owner: 999
            group: 999
            mode: "0755"
          - path: "wordpress/html"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "tubearchivist/cache"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "tubearchivist/youtube"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "tubearchivist/es"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "tubearchivist/redis"
            owner: 999
            group: 1000
            mode: "0755"
          - path: "immich/library"
            owner: 0
            group: 0
            mode: "0755"
          - path: "immich/postgres"
            owner: 999
            group: 0
            mode: "0700"
          - path: "mealie/data"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "mealie/prompts"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "homepage/config"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "n8n/data"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "n8n/postgres"
            owner: 999
            group: 999
            mode: "0700"
          - path: "aria2/config"
            owner: 1000
            group: 1000
            mode: "0755"
          - path: "aria2/downloads"
            owner: 1000
            group: 1000
            mode: "0755"
        # Stub vault_secrets — fake values sufficient for template rendering
        vault_secrets:
          desec:
            login: "test"
            api_token: "test-token"
          authentik:
            pgpass: "test"
            secret_key: "test-key"
            email_username: "test"
            email_password: "test"
          wordpress:
            mysql_database: "wp"
            mysql_user: "wp"
            mysql_password: "test"
          tubearchivist:
            username: "admin"
            password: "test"
            elastic_pass: "test"
          immich:
            db_password: "test"
            db_username: "immich"
            db_database_name: "immich"
          mealie:
            openai_base_url: "https://openrouter.ai/api/v1"
            openai_api_key: "test"
            oidc_provider_name: "Authentik"
            oidc_configuration_url: "https://auth.test.example.com/application/o/mealie/.well-known/openid-configuration"
            oidc_client_id: "test"
            oidc_client_secret: "test"
            oidc_user_group: "mealie-users"
            oidc_admin_group: "mealie-admins"
          n8n:
            postgres_user: "n8n"
            postgres_password: "test"
            postgres_db: "n8n"
          aria2:
            rpc_secret: "test-secret"
        # Immich hardware devices (stub for testing — no real GPU needed)
        immich_ml_devices:
          - /dev/null:/dev/null
        immich_ml_usb_bus: /dev/null

verifier:
  name: ansible

lint: |
  set -e
  ansible-lint
