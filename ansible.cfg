[defaults]
inventory = inventory/hosts.ini
vault_password_file = .vault_pass
host_key_checking = False

stdout_callback = default
bin_ansible_callbacks = True

[connection]
# Pipelining eliminates the extra SSH round-trip for module transfer,
# which also prevents "junk after JSON" warnings from Python 3.14 on Fedora.
pipelining = true

[callback_default]
result_format = yaml

[privilege_escalation]
become_ask_pass = true
