---
- name: Check if WordPress stack exists before stopping
  ansible.builtin.stat:
    path: "{{ stack_root }}/wordpress/docker-compose.yml"
  register: compose_file

- name: Shut down WordPress stack
  community.docker.docker_compose_v2:
    project_src: "{{ stack_root }}/wordpress"
    state: absent
    remove_volumes: false
  when: compose_file.stat.exists
