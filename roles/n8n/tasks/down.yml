---
- name: Check if n8n stack exists before stopping
  ansible.builtin.stat:
    path: "{{ stack_root }}/n8n/docker-compose.yml"
  register: compose_file

- name: Shut down n8n stack
  community.docker.docker_compose_v2:
    project_src: "{{ stack_root }}/n8n"
    state: absent
    remove_volumes: false
  when: compose_file.stat.exists
