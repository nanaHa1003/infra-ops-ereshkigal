---
# 1. Remove Podman and conflicting packages
- name: Remove Podman and related packages
  ansible.builtin.dnf5:
    name:
      - podman
      - podman-docker
      - buildah
      - skopeo
    state: absent

# 2. Setup Docker Repo & Install (Fedora specific)
- name: Add Docker Repository
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/fedora/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'

- name: Install Docker Engine
  ansible.builtin.dnf5:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# 3. Setup the operator user
- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# 4. SELinux: Allow Docker to access the storage root
- name: Set SELinux labels for storage root
  ansible.builtin.sefcontext:
    target: "{{ storage_root }}(/.*)?"
    setype: container_file_t
    state: present

- name: Apply SELinux permissions (restorecon)
  ansible.builtin.command: "restorecon -Rv {{ storage_root }}"
  changed_when: false

# 5. Ensure the stack root directory exists
- name: Ensure stack root directory exists with correct permissions
  ansible.builtin.file:
    path: "{{ stack_root }}"
    state: directory
    owner: 0
    group: 0
    mode: "0700"
    recurse: false

# 6. Create all service storage directories in one pass
- name: Create service storage directories with correct ownership
  ansible.builtin.file:
    path: "{{ storage_root }}/{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(1000) }}"
    group: "{{ item.group | default(1000) }}"
    mode: "{{ item.mode | default('0755') }}"
    recurse: false
  loop: "{{ storage_permissions }}"

# 7. Configure deSEC DDNS updates
- name: Deploy deSEC DDNS update script
  ansible.builtin.template:
    src: ddupdate.sh.j2
    dest: /usr/local/bin/ddupdate.sh
    owner: root
    group: root
    mode: '0755'

- name: Schedule DDNS update via cron
  ansible.builtin.cron:
    name: "deSEC DDNS Update"
    minute: "*/15"
    job: "/usr/local/bin/ddupdate.sh > /dev/null 2>&1"
    state: present
