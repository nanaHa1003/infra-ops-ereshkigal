---
- name: Check if Auth stack exists before stopping
  ansible.builtin.stat:
    path: "{{ stack_root }}/auth/docker-compose.yml"
  register: auth_compose_file

- name: Shut down Auth stack
  community.docker.docker_compose_v2:
    project_src: "{{ stack_root }}/auth"
    state: absent
    remove_volumes: false
  when: auth_compose_file.stat.exists
