---
name: CI

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      # Required by gitleaks-action to read PR commit list when triggered
      # by a pull_request event (GET /repos/.../pulls/:number/commits).
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general community.docker

      - name: Set up CI vault (mock plaintext secrets)
        run: |
          # SAFETY: the dummy vault password is written to /tmp, never to .vault_pass
          # in the repo root. Writing to .vault_pass would clobber a developer's real
          # password file if this step were run locally. ANSIBLE_VAULT_PASSWORD_FILE
          # takes precedence over vault_password_file in ansible.cfg at runtime,
          # so ansible.cfg does not need to change.
          #
          # Guard: GitHub Actions always sets CI=true. If someone runs this step
          # manually in a local shell (without CI=true), abort immediately.
          if [ "${CI}" != "true" ]; then
            echo "ERROR: This step must only run in CI. Do not execute it locally."
            echo "       It would overwrite your local vault.yml with plaintext stubs."
            exit 1
          fi
          echo "ci-vault-password" > /tmp/ci-vault-pass
          echo "ANSIBLE_VAULT_PASSWORD_FILE=/tmp/ci-vault-pass" >> "$GITHUB_ENV"
          # Replace the encrypted vault with the committed plaintext CI stub.
          # Safe here because CI always operates on a fresh checkout with no
          # real secrets present.
          cp inventory/group_vars/all/vault.ci.yml inventory/group_vars/all/vault.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Syntax check — site.yml
        run: >
          ansible-playbook site.yml --syntax-check
          -i inventory/hosts.ini.example

      - name: Syntax check — down.yml
        run: >
          ansible-playbook down.yml --syntax-check
          -i inventory/hosts.ini.example

  molecule:
    name: Molecule idempotency
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general community.docker

      - name: Set up CI vault (mock plaintext secrets)
        run: |
          # SAFETY: see comment in the lint job above. Same rules apply here.
          if [ "${CI}" != "true" ]; then
            echo "ERROR: This step must only run in CI. Do not execute it locally."
            echo "       It would overwrite your local vault.yml with plaintext stubs."
            exit 1
          fi
          echo "ci-vault-password" > /tmp/ci-vault-pass
          echo "ANSIBLE_VAULT_PASSWORD_FILE=/tmp/ci-vault-pass" >> "$GITHUB_ENV"
          cp inventory/group_vars/all/vault.ci.yml inventory/group_vars/all/vault.yml

      - name: Run Molecule tests
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
