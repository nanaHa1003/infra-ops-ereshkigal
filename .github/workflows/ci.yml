---
name: CI

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general community.docker

      - name: Set up CI vault (mock plaintext secrets)
        run: |
          # Write a dummy vault password so ansible.cfg is satisfied
          echo "ci-vault-password" > .vault_pass
          # Replace the encrypted vault with the committed plaintext CI stub
          cp inventory/group_vars/all/vault.ci.yml inventory/group_vars/all/vault.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Syntax check — site.yml
        run: >
          ansible-playbook site.yml --syntax-check
          -i inventory/hosts.ini.example

      - name: Syntax check — down.yml
        run: >
          ansible-playbook down.yml --syntax-check
          -i inventory/hosts.ini.example

  molecule:
    name: Molecule idempotency
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general community.docker

      - name: Set up CI vault (mock plaintext secrets)
        run: |
          echo "ci-vault-password" > .vault_pass
          cp inventory/group_vars/all/vault.ci.yml inventory/group_vars/all/vault.yml

      - name: Run Molecule tests
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
